openapi: 3.1.0
info:
  title: TradingView Screener API
  version: "1.0.0"
  description: |
    API wrapper around TradingView's screener service. Use it to run queries
    against different markets and retrieve indicator values for tickers.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://scanner.tradingview.com
    description: Primary API server
security:
  - SessionCookieAuth: []
paths:
  '/{market}/scan':
    post:
      operationId: postScreenerScan
      summary: Retrieve screener data
      tags: [Screener]
      parameters:
        - $ref: '#/components/parameters/MarketPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Query'
            example:
              markets: ['crypto']
              symbols:
                tickers: ['BINANCE:BTCUSDT']
              columns: ['RSI', 'EMA20']
              range: [0, 50]
      responses:
        '200':
          description: Screener results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenerResult'
              example:
                totalCount: 1
                data:
                  - s: 'BINANCE:BTCUSDT'
                    d: [52000.0, 15.2]
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
      description: |
        Session cookie from TradingView. Obtain it via browser developer tools
        or by authenticating to https://www.tradingview.com/accounts/signin/.
