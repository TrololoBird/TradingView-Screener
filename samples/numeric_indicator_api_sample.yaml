        - options
        default: america
  schemas:
    QueryDict:
      type: object
      properties:
        markets:
          type: array
          items:
            type: string
        symbols:
          type: object
          properties:
            query:
              type: object
              properties:
                types:
                  type: array
                  items:
                    type: string
            tickers:
              type: array
              items:
                type: string
            symbolset:
              type: array
              items:
                type: string
            watchlist:
              type: object
              properties:
                id:
                  type: integer
            groups:
              type: array
              items:
                type: object
                properties:
                  type: string
                  values:
                    type: string
        options:
          type: object
        columns:
          type: array
          items:
            type: string
          description: |
            Names of technical indicators or other fields. Timeframe-supporting indicators use the syntax `INDICATOR|{tf}` where `tf` is one of the values listed in `x-timeframes`.
        filter:
          type: array
          items:
            $ref: '#/components/schemas/FilterOperation'
        filter2:
          $ref: '#/components/schemas/OperationDict'
        sort:
          $ref: '#/components/schemas/SortBy'
        range:
          type: array
          items:
            type: integer
          description: "Pagination [offset, limit]"
      required: [markets, symbols, columns]
    FilterOperation:
      type: object
      required: [left, operation, right]
      properties:
        left:
          type: string
        operation:
          type: string
          enum: [greater, egreater, less, eless, equal, nequal, in_range, not_in_range, empty, nempty, crosses, crosses_above, crosses_below, match, nmatch, smatch, has, has_none_of, above%, below%, in_range%, not_in_range%, in_day_range, in_week_range, in_month_range]
        right:
          oneOf:
            - type: number
            - type: string
            - type: array
              items:
                oneOf:
                  - type: number
                  - type: string
    OperationDict:
      type: object
      properties:
        operation:
          type: object
          required: [operator, operands]
          properties:
            operator:
              type: string
              enum: [and, or]
            operands:
              type: array
              items:
                oneOf:
                  - $ref: '#/components/schemas/OperationDict'
                  - type: object
                    properties:
                      expression:
                        $ref: '#/components/schemas/FilterOperation'
    SortBy:
      type: object
      properties:
        sortBy:
          type: string
        sortOrder:
          type: string
          enum: [asc, desc]
        nullsFirst:
          type: boolean
    ScreenerRow:
      type: object
      properties:
        s:
          type: string
        d:
          type: array
          items:
            type: number
            nullable: true
    ScreenerDict:
      type: object
      properties:
        totalCount:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/ScreenerRow'
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        totalCount:
          type: integer
        data:
          nullable: true
          oneOf:
            - type: 'null'
            - type: array
