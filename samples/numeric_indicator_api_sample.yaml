  schemas:
    Query:
      type: object
      required: [markets, symbols, columns]
      properties:
        markets:
          type: array
          items:
            type: string
        symbols:
          type: object
          properties:
            tickers:
              type: array
              items:
                type: string
        columns:
          type: array
          items:
            type: string
        filter:
          type: array
          items:
            $ref: '#/components/schemas/FilterOperation'
        sort:
          $ref: '#/components/schemas/SortBy'
        range:
          type: array
          items:
            type: integer
          description: Pagination range [offset, limit]
    FilterOperation:
      type: object
      required: [left, operation, right]
      properties:
        left:
          type: string
        operation:
          type: string
          enum: [greater, less, equal, nequal, in_range, not_in_range]
        right:
          oneOf:
            - type: number
            - type: string
            - type: array
              items:
                oneOf:
                  - type: number
                  - type: string
    SortBy:
      type: object
      properties:
        sortBy:
          type: string
        sortOrder:
          type: string
          enum: [asc, desc]
    ScreenerRow:
      type: object
      properties:
        s:
          type: string
        d:
          type: array
          items:
            type: number
            nullable: true
    ScreenerResult:
      type: object
      properties:
        totalCount:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/ScreenerRow'
    Error:
      type: object
      properties:
        error:
          type: string
        totalCount:
          type: integer
        data:
          nullable: true
          type: array
          items:
            type: string
